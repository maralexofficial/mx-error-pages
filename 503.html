<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>ERROR 503 | www.maralex.xyz</title>
    <link rel="apple-touch-icon" sizes="180x180" href="https://maralexofficial.github.io/media/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="https://maralexofficial.github.io/media/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://maralexofficial.github.io/media/favicon/favicon-16x16.png">
<link rel="manifest" href="https://maralexofficial.github.io/media/favicon/site.webmanifest">
  </head>
  <body class="min-h-screen bg-[#0b1020] text-slate-200">
    <div class="h-screen w-screen flex items-center justify-center px-6">
      <div
        class="w-full max-w-2xl rounded-2xl border border-slate-700/60 bg-slate-900/70 shadow-2xl backdrop-blur-sm"
      >
        <div class="p-8 sm:p-10">
          <div class="mb-4 flex justify-center sm:justify-start">
            <img
              src="https://maralexofficial.github.io/media/logo_dark.svg?v=2"
              alt="Maralex Logo"
              class="h-10 sm:h-12 w-auto"
            />
          </div>
          <div class="text-center sm:text-left">
            <h1 class="m-0 font-mono text-2xl sm:text-3xl font-bold text-red-400">
              503 - Dienst vorübergehend nicht verfügbar
            </h1>
            <p class="mt-6 mb-6 font-mono text-sm sm:text-base text-slate-300 leading-relaxed">
Der Server kann deine Anfrage derzeit nicht bearbeiten. Dies kann auf geplante Wartungsarbeiten oder eine vorübergehend hohe Auslastung zurückzuführen sein. Bitte versuche es in einigen Minuten erneut.
            </p>
              <span class="inline-flex items-center rounded-md bg-red-400/10 px-2 py-1 text-xs font-medium text-red-400 inset-ring inset-ring-red-400/20">HTTP 503</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
